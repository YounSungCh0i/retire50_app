<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전략 셋업 | RETIRE: 50</title>
  <style>
    /* TFT & Dark Premium Aesthetic */
    :root {
      --bg-color: #0f111a;
      --panel-bg: #1e2029;
      --border-color: #3f3f46;
      --accent-gold: #facc15;
      --accent-green: #10b981;
      --text-main: #f8fafc;
      --text-sub: #94a3b8;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(16, 185, 129, 0.05), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(250, 204, 21, 0.05), transparent 25%);
    }

    .setup-container {
      width: 100%;
      max-width: 600px;
      background: var(--panel-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* Progress Bar */
    .progress-container {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.1);
      margin-bottom: 30px;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      width: 33.3%;
      background: linear-gradient(90deg, var(--accent-green), var(--accent-gold));
      transition: width 0.4s ease;
    }

    /* Step Container */
    .step {
      display: none;
      animation: fadeIn 0.4s ease;
    }
    .step.active {
      display: block;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .step-title {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 10px;
      color: #fff;
    }
    .step-subtitle {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 30px;
      line-height: 1.5;
    }

    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 8px;
      font-weight: 600;
    }
    .form-control {
      width: 100%;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border-color);
      color: #fff;
      padding: 14px 16px;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent-green);
    }
    .form-control::placeholder {
      color: #52525b;
    }
    
    .input-unit-wrapper {
      position: relative;
    }
    .input-unit-wrapper .form-control {
      padding-right: 40px;
    }
    .input-unit {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-sub);
      font-size: 14px;
      pointer-events: none;
    }

    /* Selection Buttons (MBTI) */
    .option-btn {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 20px;
      text-align: left;
      cursor: pointer;
      margin-bottom: 15px;
      transition: all 0.2s;
    }
    .option-btn:hover {
      background: rgba(255,255,255,0.05);
      border-color: #52525b;
    }
    .option-btn.selected {
      background: rgba(16,185,129,0.1);
      border-color: var(--accent-green);
    }
    .option-title {
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 8px;
      display: block;
    }
    .option-desc {
      font-size: 13px;
      color: var(--text-sub);
      line-height: 1.4;
    }

    /* Two Column Grid */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    /* Actions */
    .actions {
      display: flex;
      justify-content: space-between;
      margin-top: 40px;
    }
    .btn {
      padding: 12px 24px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-prev {
      background: transparent;
      color: var(--text-sub);
      border: 1px solid var(--border-color);
    }
    .btn-prev:hover {
      background: rgba(255,255,255,0.05);
      color: #fff;
    }
    .btn-next {
      background: var(--accent-green);
      color: #fff;
    }
    .btn-next:hover {
      background: #059669;
    }
    .btn-finish {
      background: linear-gradient(90deg, #facc15, #f59e0b);
      color: #000;
    }
    
    /* Toggle Switch */
    .toggle-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .toggle-label { font-size: 13px; color: var(--text-sub); }
  </style>
</head>
<body>

  <div class="setup-container">
    <div class="progress-container">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- Step 1: 현금 흐름 -->
    <div class="step active" id="step1">
      <div class="step-title">기본 현금 흐름</div>
      <div class="step-subtitle">현재 나이와 매월 들어오고 나가는 돈(현금 흐름)을 파악합니다.</div>

      <div class="grid-2">
        <div class="form-group">
          <label>현재 나이</label>
          <div class="input-unit-wrapper">
            <input type="number" id="age" class="form-control" placeholder="예: 35">
            <span class="input-unit">세</span>
          </div>
        </div>
        <div class="form-group">
          <label>월 평균 실수령액 (세후)</label>
          <div class="input-unit-wrapper">
            <input type="text" id="income-net" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>월 고정 지출 (주거비, 보험, 통신비 등)</label>
          <div class="input-unit-wrapper">
            <input type="text" id="expense-fixed" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="form-group">
          <label>월 변동 지출 (식비, 여가비 등 재량소비)</label>
          <div class="input-unit-wrapper">
            <input type="text" id="expense-var" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <div class="actions" style="justify-content: flex-end;">
        <button type="button" class="btn btn-next" onclick="nextStep(2)">다음 (투자 자산) ➔</button>
      </div>
    </div>

    <!-- Step 2: 투자 자산 -->
    <div class="step" id="step2">
      <div class="step-title">투자 가능 자산 (Investable)</div>
      <div class="step-subtitle">언제든 현금화하여 굴릴 수 있는 금융 자산의 규모를 파악합니다.</div>

      <div class="form-group">
        <label>예금 및 적금 총액</label>
        <div class="input-unit-wrapper">
          <input type="text" id="asset-bank" class="form-control comma" placeholder="0">
          <span class="input-unit">원</span>
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>주식 및 코인 총액</label>
          <div class="input-unit-wrapper">
            <input type="text" id="asset-stock" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="form-group">
          <label>해외 주식 비중 (%)</label>
          <div class="input-unit-wrapper">
            <input type="number" id="stock-foreign-ratio" class="form-control" placeholder="예: 80">
            <span class="input-unit">%</span>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>채권 총액</label>
          <div class="input-unit-wrapper">
            <input type="text" id="asset-bond" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="form-group" style="display:flex; flex-direction:column; justify-content:center;">
          <div class="toggle-wrapper">
            <input type="checkbox" id="has-isa" style="width: 18px; height: 18px; accent-color: var(--accent-green);">
            <label for="has-isa" class="toggle-label" style="margin:0;">절세용 ISA 계좌를 보유 중입니다.</label>
          </div>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-prev" onclick="prevStep(1)">⬅ 이전</button>
        <button type="button" class="btn btn-next" onclick="nextStep(3)">다음 (잠긴 자산) ➔</button>
      </div>
    </div>

    <!-- Step 3: 잠긴 자산 -->
    <div class="step" id="step3">
      <div class="step-title">잠긴 자산 (Locked)</div>
      <div class="step-subtitle">당장 팔기 어렵거나 노후를 위해 묶여있는 자산을 파악합니다.</div>

      <div class="grid-2">
        <div class="form-group">
          <label>거주 부동산 가치 (전월세 보증금 포함)</label>
          <div class="input-unit-wrapper">
            <input type="text" id="asset-realestate" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="form-group">
          <label>남은 주담대 / 전세자금 대출 잔액</label>
          <div class="input-unit-wrapper">
            <input type="text" id="loan-realestate" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <div class="grid-2">
        <div class="form-group">
          <label>사적 연금 총액 (연금저축/IRP)</label>
          <div class="input-unit-wrapper">
            <input type="text" id="asset-pension" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
        <div class="form-group">
          <label>퇴직금 누적액 (DC형/DB형 합산)</label>
          <div class="input-unit-wrapper">
            <input type="text" id="asset-severance" class="form-control comma" placeholder="0">
            <span class="input-unit">원</span>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>저축성 보험 (종신/연금보험) 월 납입액</label>
        <div class="input-unit-wrapper">
          <input type="text" id="insurance-premium" class="form-control comma" placeholder="0">
          <span class="input-unit">원</span>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-prev" onclick="prevStep(2)">⬅ 이전</button>
        <button type="button" class="btn btn-finish" onclick="finishSetup()">엔진 가동 (결과 보기) 🚀</button>
      </div>
    </div>

  </div>

  <script>
    // 상태 관리
    const answers = { risk: null, housing: null, sideHustle: null, frugality: null };

    function selectOption(category, value, btnEl) {
      answers[category] = value;
      const parent = btnEl.parentElement;
      parent.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('selected'));
      btnEl.classList.add('selected');
    }

    function nextStep(step) {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');
      document.getElementById('progressBar').style.width = (step * 33.33) + '%';
    }

    function prevStep(step) {
      document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
      document.getElementById('step' + step).classList.add('active');
      document.getElementById('progressBar').style.width = (step * 33.33) + '%';
    }

    // 천단위 콤마 자동 입력
    document.querySelectorAll('.comma').forEach(input => {
      input.addEventListener('input', function(e) {
        let val = e.target.value.replace(/,/g, '').replace(/[^0-9]/g, '');
        if (val !== '') {
          e.target.value = parseInt(val, 10).toLocaleString('ko-KR');
        } else {
          e.target.value = '';
        }
      });
    });

    function getVal(id) {
      const val = document.getElementById(id).value.replace(/,/g, '');
      return parseInt(val, 10) || 0;
    }

    function finishSetup() {
      // 8개 카테고리 파싱 규격에 맞게 JSON 조립
      const fireUserInputs = {
        answers: null, // MBTI는 대시보드에서 진단
        financials: {
          age: getVal('age') || 35,
          hasISA: document.getElementById('has-isa').checked,
          isaAge: 1, // 임의값
          hasSideHustle: false,
          sideHustleIncome: 0,
          categories: {
            bank: { amount: getVal('asset-bank') },
            stock: { 
              amount: getVal('asset-stock'), 
              foreignRatio: parseInt(document.getElementById('stock-foreign-ratio').value) || 0 
            },
            bond: { amount: getVal('asset-bond') },
            insurance: { monthlyPremium: getVal('insurance-premium') },
            pension: { 
              private: {
                irp: getVal('asset-pension') * 0.5, // 편의상 반반
                savings: getVal('asset-pension') * 0.5,
                severance: getVal('asset-severance')
              }
            },
            realEstate: {
              marketValue: getVal('asset-realestate'),
              loanBalance: getVal('loan-realestate'),
              isResidential: true,
              monthlyLoanPayment: 0
            },
            income: {
              monthlyNet: getVal('income-net'),
              monthlyFixed: getVal('expense-fixed'),
              monthlyVariable: getVal('expense-var')
            }
          }
        }
      };

      // 로컬 스토리지 + 세션 스토리지 모두 저장 (이중 안전장치)
      const dataStr = JSON.stringify(fireUserInputs);
      try { localStorage.setItem('fireUserInputs', dataStr); } catch(e) { console.warn('localStorage 실패', e); }
      try { sessionStorage.setItem('fireUserInputs', dataStr); } catch(e) { console.warn('sessionStorage 실패', e); }
      
      // 바로 대시보드로 이동
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
